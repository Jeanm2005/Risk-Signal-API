<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Risk Signal API — Live Demo</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0f1115; color: #e6e9ef;
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; justify-content: center; padding: 40px 16px;
  }
  .wrap { width: 100%; max-width: 640px; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.01em; color: #e6e9ef; }
  .sub { color: #9aa4b2; font-size: 13.5px; margin: 0 0 20px; }
  .card { background: #171a21; border: 1px solid #262b36; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: #9aa4b2; margin-bottom: 6px; }
  input, textarea { width: 100%; background: #0e1116; color: #e6e9ef; border: 1px solid #262b36; border-radius: 9px; padding: 10px 12px; font: inherit; resize: vertical; }
  input:focus, textarea:focus { outline: none; border-color: #4f8cff; }
  textarea { min-height: 96px; }
  .row { margin-bottom: 14px; }
  .examples { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .chip { background: #10141b; border: 1px solid #262b36; color: #9aa4b2; border-radius: 999px; padding: 5px 11px; font-size: 12.5px; cursor: pointer; }
  .chip:hover { border-color: #4f8cff; color: #e6e9ef; }
  .actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  button.primary { background: #4f8cff; color: #fff; border: none; border-radius: 9px; padding: 10px 20px; font: inherit; font-weight: 600; cursor: pointer; }
  button.primary:disabled { opacity: 0.5; cursor: default; }
  .result { display: none; }
  .verdict { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .pill { font-size: 18px; font-weight: 700; text-transform: capitalize; padding: 4px 14px; border-radius: 999px; }
  .pill.negative { background: rgba(255,92,92,.15); color: #ff5c5c; }
  .pill.positive { background: rgba(55,201,139,.15); color: #37c98b; }
  .pill.neutral  { background: rgba(138,147,163,.15); color: #8a93a3; }
  .risk { color: #9aa4b2; font-size: 13px; }
  .risk b { color: #e6e9ef; font-size: 15px; }
  .bar-row { display: grid; grid-template-columns: 74px 1fr 52px; align-items: center; gap: 10px; margin: 7px 0; font-size: 13px; }
  .track { height: 8px; background: #0e1116; border-radius: 999px; overflow: hidden; }
  .fill { height: 100%; border-radius: 999px; transition: width .5s ease; }
  .pct { text-align: right; color: #9aa4b2; font-variant-numeric: tabular-nums; }
  .meta { color: #9aa4b2; font-size: 12px; margin-top: 14px; border-top: 1px solid #262b36; padding-top: 12px; }
  .err { color: #ff5c5c; font-size: 13px; margin-top: 10px; display: none; }
  .parity { font-size: 12px; color: #9aa4b2; cursor: pointer; border: 1px solid #262b36; border-radius: 999px; padding: 4px 10px; background: none; }
  .parity.ok { color: #37c98b; border-color: rgba(55,201,139,.4); }
  .head { display: flex; justify-content: space-between; align-items: flex-start; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>Risk Signal API</h1>
      <p class="sub">Financial text &rarr; risk sentiment, served from an ONNX model
        proven identical to its Python original.</p>
    </div>
    <button class="parity" id="parityBtn" title="Check Python&harr;C# parity">verify parity</button>
  </div>

  <div class="card">
    <div class="row">
      <label for="key">API key</label>
      <input id="key" type="password" placeholder="rsk_... (paste your key; it is never stored)" autocomplete="off" />
    </div>
    <div class="row">
      <label for="text">Financial text</label>
      <textarea id="text" placeholder="Paste a headline or a sentence from a filing..."></textarea>
      <div class="examples">
        <span class="chip" data-ex="neg">negative example</span>
        <span class="chip" data-ex="pos">positive example</span>
        <span class="chip" data-ex="neu">neutral example</span>
      </div>
    </div>
    <div class="actions">
      <button class="primary" id="scoreBtn">Score</button>
    </div>
    <div class="err" id="err"></div>
  </div>

  <div class="card result" id="result">
    <div class="verdict">
      <span class="pill" id="pill"></span>
      <span class="risk">risk score <b id="risk"></b></span>
    </div>
    <div id="bars"></div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<script>
  const EXAMPLES = {
    neg: "Shares plunged after the company slashed guidance and disclosed an SEC probe.",
    pos: "The company reported record quarterly revenue and raised its full-year guidance.",
    neu: "The board of directors will convene on Thursday to review the quarterly report."
  };
  const $ = id => document.getElementById(id);

  document.querySelectorAll('.chip').forEach(c =>
    c.onclick = () => { $('text').value = EXAMPLES[c.dataset.ex]; });

  function bar(label, value, color) {
    const pct = (value * 100).toFixed(1) + '%';
    return `<div class="bar-row"><span>${label}</span>
      <div class="track"><div class="fill" style="width:${(value*100).toFixed(1)}%;background:${color}"></div></div>
      <span class="pct">${pct}</span></div>`;
  }

  async function score() {
    const key = $('key').value.trim();
    const text = $('text').value.trim();
    $('err').style.display = 'none';
    if (!text) { showErr('Enter some text to score.'); return; }
    if (!key)  { showErr('Paste your API key first.'); return; }

    $('scoreBtn').disabled = true; $('scoreBtn').textContent = 'Scoring...';
    const t0 = performance.now();
    try {
      const res = await fetch('/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
        body: JSON.stringify({ text })
      });
      const ms = Math.round(performance.now() - t0);
      if (res.status === 401) { showErr('Unauthorized — check your API key.'); return; }
      if (!res.ok) { showErr('Server error (' + res.status + ').'); return; }
      const d = await res.json();
      render(d, ms);
    } catch (e) {
      showErr('Could not reach the API. Is the server running?');
    } finally {
      $('scoreBtn').disabled = false; $('scoreBtn').textContent = 'Score';
    }
  }

  function render(d, ms) {
    $('pill').textContent = d.label;
    $('pill').className = 'pill ' + d.label;
    $('risk').textContent = d.riskScore.toFixed(3);
    $('bars').innerHTML =
      bar('positive', d.scores.positive, '#37c98b') +
      bar('negative', d.scores.negative, '#ff5c5c') +
      bar('neutral',  d.scores.neutral,  '#8a93a3');
    $('meta').textContent = `${d.tokenCount} tokens · ${ms} ms round trip · finbert-base · onnx`;
    $('result').style.display = 'block';
  }

  function showErr(m) { $('err').textContent = m; $('err').style.display = 'block'; }

  $('scoreBtn').onclick = score;
  $('text').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') score();
  });

  $('parityBtn').onclick = async () => {
    $('parityBtn').textContent = 'checking...';
    try {
      const r = await fetch('/parity');
      const d = await r.json();
      if (d.all_pass) {
        $('parityBtn').textContent = '\u2713 parity verified';
        $('parityBtn').classList.add('ok');
      } else {
        $('parityBtn').textContent = 'parity FAILED';
      }
    } catch { $('parityBtn').textContent = 'verify parity'; }
  };
</script>
</body>
</html>
